---
llm_access_mode:
  description: >
    How llm_chat_complete reaches a model. http uses provider HTTP APIs and
    api_token / OPENAI_API_KEY / ANTHROPIC_API_KEY / CURSOR_API_KEY. agent_cli
    spawns a coding-agent CLI or operator wrapper on the StackStorm runner so
    auth stays with the agent install (OAuth/session) instead of pack secrets.
  type: string
  required: false
  enum:
    - http
    - agent_cli
  default: http
agent_cli_profile:
  description: >
    Required when llm_access_mode=agent_cli. stdin_json_bridge runs
    agent_cli_executable with JSON stdin (see pack README). claude_code runs
    agent_cli_binary (default claude) in headless print mode with JSON stdout.
    custom uses agent_cli_argv_json argv templates with placeholders
    {combined_prompt}, {user_prompt}, {system_prompt}, {model}, {temperature}.
  type: string
  required: false
  enum:
    - stdin_json_bridge
    - claude_code
    - custom
agent_cli_executable:
  description: >
    Path or name on PATH for stdin_json_bridge (reads JSON stdin, prints JSON
    with a string "content" field on stdout).
  type: string
  required: false
agent_cli_binary:
  description: >
    Executable for claude_code profile (default claude). Must be logged in on
    the runner or use the same environment as an interactive Claude Code session.
  type: string
  required: false
agent_cli_working_directory:
  description: Optional working directory for the agent CLI subprocess.
  type: string
  required: false
agent_cli_argv_json:
  description: >
    JSON array of argv strings for agent_cli_profile=custom. Placeholders
    {combined_prompt}, {user_prompt}, {system_prompt}, {model}, {temperature}
    are substituted per argument (no shell).
  type: string
  required: false
agent_cli_stdout_kind:
  description: >
    How to parse agent CLI stdout for custom profile (defaults: json_content
    for stdin_json_bridge, claude_code_result for claude_code, raw_text for
    custom). json_content expects {"content":"..."}. claude_code_result expects
    Claude Code --output-format=json shape with a string "result" field.
  type: string
  required: false
  enum:
    - json_content
    - claude_code_result
    - raw_text
llm_provider:
  description: >
    Which upstream API to call. openai and cursor use OpenAI-compatible
    chat/completions JSON. anthropic uses the Messages API. When unset, openai
    is assumed.
  type: string
  required: false
  enum:
    - openai
    - anthropic
    - cursor
llm_chat_completions_url:
  description: >
    Chat HTTP URL. For openai defaults to https://api.openai.com/v1/chat/completions.
    For anthropic defaults to https://api.anthropic.com/v1/messages. For cursor
    this must be set (OpenAI-compatible gateway or proxy URL).
  type: string
  required: false
llm_model:
  description: Model id to send (provider-specific; see defaults per llm_provider).
  type: string
  required: false
  default: gpt-4o-mini
llm_max_tokens:
  description: >
    Anthropic only: max_tokens for the Messages API (capped for safety).
  type: integer
  required: false
  default: 4096
llm_call_timeout_seconds:
  description: >
    Maximum seconds for each llm_chat_complete HTTP request or agent_cli subprocess.
    The action's timeout_seconds parameter is capped to this value (smaller wins).
  type: integer
  required: false
  default: 120
max_user_prompt_bytes:
  description: >
    Maximum UTF-8 byte length for user_prompt on llm_chat_complete (enforced before I/O).
  type: integer
  required: false
  default: 32768
max_system_prompt_bytes:
  description: >
    Maximum UTF-8 byte length for system_prompt on llm_chat_complete when set (enforced before I/O).
  type: integer
  required: false
  default: 32768
agent_cli_allowed_executable_prefix:
  description: >
    Optional directory prefix for resolved agent_cli executables. When set, stdin_json_bridge
    agent_cli_executable, claude_code agent_cli_binary (after PATH resolution), and the first
    argv element for custom must resolve under this path (realpath).
  type: string
  required: false
api_token:
  description: >
    API secret when not using environment variables. If unset, the runner reads
    OPENAI_API_KEY (openai), ANTHROPIC_API_KEY (anthropic), or CURSOR_API_KEY
    (cursor). Prefer StackStorm datastore / secrets in real deployments.
  type: string
  secret: true
  required: false
cursor_api_basic_auth:
  description: >
    When true and llm_provider is cursor, send Authorization Basic (key as
    username, empty password) per Cursor HTTP docs; otherwise Bearer is used
    (typical for OpenAI-compatible gateways).
  type: boolean
  required: false
  default: false
