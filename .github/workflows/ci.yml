# CI: Ruff (lint + format), pytest via uv, EditorConfig, Keep a Changelog, Conventional Commits.
# StackStorm pack YAML is validated indirectly by offline tests and manual st2 registration.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  editorconfig:
    name: EditorConfig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: editorconfig-checker/action-editorconfig-checker@v2.2.0
      - name: Run editorconfig-checker
        run: editorconfig-checker

  changelog:
    name: Keep a Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mindsers/changelog-reader-action@v2.2.3
        with:
          validation_level: error
          path: ./CHANGELOG.md

  commitlint:
    name: Conventional commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Ruff check
        run: uvx ruff check actions tests
      - name: Ruff format
        run: uvx ruff format --check actions tests

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: uv pip install -r requirements-tests.txt
      - name: Run tests
        run: uv run pytest -q
