---
name: llm_chat_complete
pack: llm_plan_task
runner_type: python-script
enabled: true
entry_point: llm_chat_complete.py
description: >
  Chat completion using pack config: llm_access_mode http (default) calls
  provider HTTP APIs (openai, anthropic, cursor) with api_token or OPENAI_API_KEY
  / ANTHROPIC_API_KEY / CURSOR_API_KEY; llm_access_mode agent_cli runs a coding
  agent CLI or stdin JSON bridge (see config.schema.yaml and README).
parameters:
  user_prompt:
    type: string
    required: true
  system_prompt:
    type: string
    required: false
  temperature:
    type: number
    required: false
    default: 0.2
  timeout_seconds:
    type: integer
    required: false
    default: 60
