---
name: llm_chat_complete
pack: llm_plan_task
runner_type: python-script
enabled: true
entry_point: llm_chat_complete.py
description: >
  Chat completion call using pack configuration: llm_provider (openai, anthropic,
  cursor), optional llm_chat_completions_url, llm_model, api_token or provider
  env keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, CURSOR_API_KEY).
parameters:
  user_prompt:
    type: string
    required: true
  system_prompt:
    type: string
    required: false
  temperature:
    type: number
    required: false
    default: 0.2
  timeout_seconds:
    type: integer
    required: false
    default: 60
