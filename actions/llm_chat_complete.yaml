---
name: llm_chat_complete
pack: llm_plan_task
runner_type: python-script
enabled: true
entry_point: llm_chat_complete.py
description: >
  Optional OpenAI-compatible chat completions call using pack configuration
  (llm_chat_completions_url, api_token, llm_model).
parameters:
  user_prompt:
    type: string
    required: true
  system_prompt:
    type: string
    required: false
  temperature:
    type: number
    required: false
    default: 0.2
  timeout_seconds:
    type: integer
    required: false
    default: 60
